name: CI
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  python-headless:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run headless smoke
        env:
          HEADLESS: '1'
          HEADLESS_TICKS: '30'
        run: |
          python3 main.py

  go-build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      - name: Go mod download
        working-directory: go
        run: go mod download
      - name: Go mod tidy
        working-directory: go
        run: go mod tidy
      - name: Build server
        working-directory: go
        run: go build ./server